services:
  - type: web
    name: rh-token-explorer
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: RPC_URL
        value: https://ac23019b22f1ae5a.offchainlabs.com/rpc/a6186cb065b52ca24da0d197e33b303c
      # Optional overrides — edit in the Render dashboard if the chain endpoints change:
      # - key: EXPLORER_URL
      #   value: https://so-explorer.poptyedev.com
      # - key: ETH_USD          # set to also show USD even if the price feed is blocked
      #   value: ""
